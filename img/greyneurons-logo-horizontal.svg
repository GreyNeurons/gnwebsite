<svg width="600" height="120" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="120" fill="#ffffff"/>

  <!-- Hexagonal neural mark -->
  <g transform="translate(72, 60)">
    <polygon points="0,-42 36,-21 36,21 0,42 -36,21 -36,-21" fill="#3d3d5c"/>
    <line x1="0" y1="-10" x2="0" y2="-32" stroke="#6060a0" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="9" y1="5" x2="27" y2="16" stroke="#6060a0" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-9" y1="5" x2="-27" y2="16" stroke="#6060a0" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="0" y1="-10" x2="16" y2="-24" stroke="#4a4a70" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="0" y1="-10" x2="-16" y2="-24" stroke="#4a4a70" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="9" y1="5" x2="-9" y2="5" stroke="#4a4a70" stroke-width="0.9" stroke-linecap="round"/>
    <circle cx="0" cy="-32" r="4" fill="#8888b8"/>
    <circle cx="27" cy="16" r="4" fill="#8888b8"/>
    <circle cx="-27" cy="16" r="4" fill="#8888b8"/>
    <circle cx="16" cy="-24" r="2.8" fill="#7070a0"/>
    <circle cx="-16" cy="-24" r="2.8" fill="#7070a0"/>
    <circle cx="0" cy="0" r="10" fill="#ffffff" fill-opacity="0.18"/>
    <circle cx="0" cy="0" r="5.5" fill="#ffffff" fill-opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="128" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="bold" fill="#2a2a3c" letter-spacing="0.5">Grey</text>
  <text x="244" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="bold" fill="#5a5a8a" letter-spacing="0.5">Neurons</text>

  <!-- Rule + tagline -->
  <line x1="128" y1="83" x2="540" y2="83" stroke="#d0d0e0" stroke-width="0.7"/>
  <text x="128" y="99" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="10" fill="#8888aa" letter-spacing="0.24em">EXPERIENCE THE WISDOM</text>
</svg>
